<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hammad Final Perfect</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
@font-face {
  font-family: 'Nevera';
  src: url('./Nevera.otf') format('opentype');
}

:root{--n1:#00f5ff;--n2:#ff00ea}

body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

.card{
  text-align:center;
  padding:30px;
  margin-top:auto;
}

.avatar-ring{
  width:110px;height:110px;
  margin:0 auto 14px;
  border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg,var(--n1),var(--n2));
  display:flex;
  align-items:center;
  justify-content:center;
}
.avatar-ring img{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
}

h1{
  font-family:'Nevera', sans-serif;
  letter-spacing:2px;
  color:transparent;
  background:linear-gradient(120deg,rgba(255,255,255,0.15),rgba(255,255,255,0.95),rgba(255,255,255,0.15));
  background-size:300px;
  -webkit-background-clip:text;
  animation:shineLoop 4.5s infinite;
}

@keyframes shineLoop{
  0%{background-position:-300px;}
  35%{background-position:300px;}
  100%{background-position:300px;}
}

.bio{
  white-space:pre-line;
  font-size:14px;
  margin:10px 0 20px;
}

.links a{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:12px 0;
  padding:14px;
  border-radius:20px;
  text-decoration:none;
  color:white;
  background:rgba(255,255,255,0.1);
  transition:all 0.35s ease;
  transform-style:preserve-3d;
  perspective:800px;
}

.links a:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px cyan,0 0 40px magenta;
}

.links a.active-right{
  transform:scale(1.1) rotateY(12deg);
}

.links a.active-left{
  transform:scale(1.1) rotateY(-12deg);
}

.links i{
  font-size:20px;
  transition:all 0.35s ease;
}

.links a.active-right i{
  transform:rotate(15deg) scale(1.2);
}

.links a.active-left i{
  transform:rotate(-15deg) scale(1.2);
}

.mute{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:none;
  color:white;
  font-size:20px;
}

.footer{
  margin-top:auto;
  margin-bottom:20px;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="card">

  <div class="avatar-ring">
    <img src="./profile.jpg">
  </div>

  <h1>Mohammad Hammad</h1>

  <div class="bio">ᯓᡣ𐭩
𝕮𝖎𝖓𝖊𝖒𝖆𝖙𝖎𝖈 𝖘𝖔𝖚𝖑.
𝕾𝖎𝖑𝖊𝖓𝖙 𝖗𝖔𝖑𝖊
𝕽𝖊𝖆𝖑 𝖘𝖈𝖗𝖎𝖕𝖙..ᝰ✒
🀥  †</div>

  <div class="links">
    <a href="#"><i class="fa-brands fa-instagram"></i> Instagram</a>
    <a href="#"><i class="fa-brands fa-youtube"></i> YouTube</a>
    <a href="#"><i class="fa-solid fa-file-lines"></i> Resume</a>
    <a href="#"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
    <a href="#"><i class="fa-solid fa-globe"></i> Website</a>
  </div>

</div>

<audio id="music" autoplay muted loop>
  <source src="./let_the_world_burn_remix.mp3">
</audio>

<button class="mute" onclick="toggleMute()">
  <i class="fa-solid fa-volume-xmark"></i>
</button>

<div class="footer">© 2026 Hammad. All Rights Reserved.</div>

<script>
const music=document.getElementById('music');
const btn=document.querySelector('.mute');

function toggleMute(){
  music.muted=!music.muted;
  btn.innerHTML = music.muted
    ? '<i class="fa-solid fa-volume-xmark"></i>'
    : '<i class="fa-solid fa-volume-high"></i>';
}

const links=document.querySelectorAll('.links a');
links.forEach((link,index)=>{
  link.addEventListener('click',()=>{
    links.forEach(l=>l.classList.remove('active-left','active-right'));
    if(index%2===0){
      link.classList.add('active-right');
    } else {
      link.classList.add('active-left');
    }
    setTimeout(()=>{
      link.classList.remove('active-left','active-right');
    },300);
  });
});
</script>

</body>
</html>
