<style>
@font-face {
  font-family: 'Nevera';
  src: url('./Nevera.otf') format('opentype');
}

:root{--n1:#00f5ff;--n2:#ff00ea}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Inter,Arial,sans-serif;}

body{
  background:black;
  color:white;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

.bg-video{position:fixed;inset:0;z-index:0;}
.bg-video img,.bg-video video{position:absolute;width:100%;height:100%;object-fit:cover;}
.bg-video img{z-index:1;}
.bg-video video{z-index:2;}

.content{
  position:relative;
  z-index:2;
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.card{max-width:460px;width:100%;text-align:center;}

.avatar-ring{
  width:110px;height:110px;margin:0 auto 14px;
  border-radius:50%;padding:3px;
  background:linear-gradient(135deg,var(--n1),var(--n2));
}
.avatar-ring img{width:100%;height:100%;border-radius:50%;}

h1{
  font-family:'Nevera';
  letter-spacing:2px;
  color:transparent;
  background:linear-gradient(120deg,rgba(255,255,255,.15),rgba(255,255,255,.95),rgba(255,255,255,.15));
  background-size:300px;
  -webkit-background-clip:text;
  animation:shine 4.5s infinite;
}
@keyframes shine{
  0%{background-position:-300px;}
  100%{background-position:300px;}
}

.bio{
  white-space:pre-line;
  font-size:14px;
  opacity:.95;
  margin:10px 0 22px;
}

.links{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.links a{
  width:85%;
  max-width:320px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin:10px 0;
  padding:14px 12px;
  border-radius:18px;
  font-family:'Nevera';
  font-size:14px;
  color:rgba(255,255,255,.95);
  text-decoration:none;
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.35);
  transition:.25s;
}

.links a:hover{
  transform:scale(1.05);
  box-shadow:0 0 10px rgba(0,245,255,.7),
             0 0 20px rgba(255,0,234,.4);
}

.footer{
  text-align:center;
  font-size:11px;
  opacity:.5;
  padding:8px 0;
}

.mute{
  position:fixed;
  bottom:20px;
  right:20px;
  width:48px;
  height:48px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.12);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<audio id="music" loop>

<button class="mute" onclick="toggleMute()">
<i class="fa-solid fa-volume-xmark"></i>
</button>

<script>
const music = document.getElementById('music');
const btn = document.querySelector('.mute');

let started = false;

function startAudio(){
  if(!started){
    music.muted = false;
    music.play().catch(()=>{});
    started = true;
  }
}

document.addEventListener("click", startAudio);

function toggleMute(){
  startAudio();
  music.muted = !music.muted;

  btn.innerHTML = music.muted
    ? '<i class="fa-solid fa-volume-xmark"></i>'
    : '<i class="fa-solid fa-volume-high"></i>';
}
</script>
